name: Pipeline Margens LBG

on:
  schedule:
    - cron: '0 3 * * *'   # 00h00 Brasília (UTC-3)
  workflow_dispatch:
    inputs:
      desde:
        description: 'Data início DD/MM/YYYY (opcional — padrão: automático)'
        required: false
        default: ''
      ate:
        description: 'Data fim DD/MM/YYYY (opcional — padrão: ontem)'
        required: false
        default: ''
      so_reconciliar:
        description: 'Apenas reconciliar Shopee pendentes (sem buscar pedidos novos)'
        type: boolean
        default: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          # Credenciais Supabase (obrigatórias)
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          # Credencial Tiny ERP (obrigatória)
          TINY_API_TOKEN: ${{ secrets.TINY_API_TOKEN }}
          # Credenciais estáticas Mercado Livre
          ML_APP_ID: ${{ secrets.ML_APP_ID }}
          ML_CLIENT_SECRET: ${{ secrets.ML_CLIENT_SECRET }}
          ML_SELLER_ID: ${{ secrets.ML_SELLER_ID }}
          # Tokens ML — usados apenas no primeiro run; após isso o Supabase tem os rotacionados
          ML_ACCESS_TOKEN: ${{ secrets.ML_ACCESS_TOKEN }}
          ML_REFRESH_TOKEN: ${{ secrets.ML_REFRESH_TOKEN }}
          # Credenciais estáticas Shopee
          SHOPEE_PARTNER_ID: ${{ secrets.SHOPEE_PARTNER_ID }}
          SHOPEE_PARTNER_KEY: ${{ secrets.SHOPEE_PARTNER_KEY }}
          SHOPEE_SHOP_ID: ${{ secrets.SHOPEE_SHOP_ID }}
          # Tokens Shopee — usados apenas no primeiro run; após isso o Supabase tem os rotacionados
          SHOPEE_ACCESS_TOKEN: ${{ secrets.SHOPEE_ACCESS_TOKEN }}
          SHOPEE_REFRESH_TOKEN: ${{ secrets.SHOPEE_REFRESH_TOKEN }}
        run: |
          if [ "${{ github.event.inputs.so_reconciliar }}" = "true" ]; then
            python rodar.py --so-reconciliar
          elif [ -n "${{ github.event.inputs.desde }}" ]; then
            ARGS="--desde ${{ github.event.inputs.desde }}"
            if [ -n "${{ github.event.inputs.ate }}" ]; then
              ARGS="$ARGS --ate ${{ github.event.inputs.ate }}"
            fi
            python rodar.py $ARGS
          else
            python rodar.py
          fi
